<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Showroom</title>
<style>
body{margin:0;background:#070707;color:#f7f2e8;font-family:Inter,sans-serif}
main{padding:50px 20px;max-width:1200px;margin:auto}
h1{font-size:78px;font-family:Georgia,serif;font-weight:400}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card{background:#121212;border:1px solid rgba(200,169,106,.25);border-radius:26px;padding:20px}
.fake-room{height:340px;border-radius:20px;background:linear-gradient(135deg,#1f1b17,#090909);display:flex;align-items:center;justify-content:center;color:#c8a96a}
</style>
</head>
<body>
<main>
<h1>Live Showroom</h1>
<div class="grid">
<div class="card"><div class="fake-room">Luxury Hotel Bathroom</div></div>
<div class="card"><div class="fake-room">Spa Experience Room</div></div>
<div class="card"><div class="fake-room">Residence Collection</div></div>
</div>
</main>
</body>
</html>
