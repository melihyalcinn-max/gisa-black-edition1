<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Configurator</title>
<style>
body{margin:0;background:#070707;color:#f7f2e8;font-family:Inter,sans-serif}
main{max-width:1100px;margin:auto;padding:48px 20px}
h1{font-size:72px;font-family:Georgia,serif;font-weight:400}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.card{background:#121212;border:1px solid rgba(200,169,106,.25);padding:24px;border-radius:24px}
select,input{width:100%;padding:14px;background:#0b0b0b;border:1px solid rgba(200,169,106,.25);border-radius:14px;color:#f7f2e8;margin:10px 0}
.preview{height:520px;border-radius:24px;background:linear-gradient(180deg,#1d1812,#080808);display:flex;align-items:center;justify-content:center;font-size:28px;color:#c8a96a}
</style>
</head>
<body>
<main>
<h1>Product Configurator</h1>
<div class="grid">
<div class="card">
<select><option>Matte Black</option><option>White Collection</option><option>Amber Bottle</option></select>
<select><option>300 ml</option><option>450 ml</option><option>500 ml</option></select>
<select><option>Gold Pump</option><option>Black Pump</option><option>Silver Pump</option></select>
<input placeholder="Logo adı">
</div>
<div class="card"><div class="preview">LIVE PRODUCT PREVIEW</div></div>
</div>
</main>
</body>
</html>
