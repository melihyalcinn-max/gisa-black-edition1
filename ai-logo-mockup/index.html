<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Logo Mockup Studio | GISA Black Edition</title>
  <style>
    :root { --bg:#070707; --panel:#111; --soft:#1b1b1b; --text:#f7f2e8; --muted:#b8afa3; --gold:#c8a96a; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Inter, Arial, sans-serif; background: radial-gradient(circle at top, #1b1712, #070707 52%); color:var(--text); }
    main { max-width:1180px; margin:0 auto; padding:52px 20px 80px; }
    a { color:var(--gold); }
    .eyebrow { color:var(--gold); letter-spacing:.22em; text-transform:uppercase; font-size:12px; }
    h1 { font-family: Georgia, 'Times New Roman', serif; font-size: clamp(38px, 7vw, 84px); line-height:.95; margin:14px 0 18px; font-weight:400; }
    p { color:var(--muted); line-height:1.7; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap:18px; }
    .card { background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)); border:1px solid rgba(200,169,106,.22); border-radius:24px; padding:22px; box-shadow:0 25px 80px rgba(0,0,0,.24); }
    input, textarea, select { width:100%; padding:13px 14px; border-radius:14px; border:1px solid rgba(200,169,106,.25); background:#0b0b0b; color:var(--text); margin:8px 0 14px; }
    button { border:0; border-radius:999px; padding:13px 19px; background:var(--gold); color:#090909; font-weight:700; cursor:pointer; margin:6px 8px 6px 0; }
    .ghost { background:transparent; color:var(--gold); border:1px solid rgba(200,169,106,.35); }
    .output { white-space:pre-wrap; background:#090909; border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:18px; color:#f8f0df; min-height:120px; }
    canvas { width:100%; max-width:720px; background:#0c0c0c; border:1px solid rgba(200,169,106,.25); border-radius:24px; }
    .nav { margin-bottom:32px; }
  </style>
</head>
<body>
<main>
  <div class="nav"><a href="/">← Ana sayfa</a></div>
  
  <div class="eyebrow">Free Canvas Engine</div>
  <h1>AI Logo Mockup Studio</h1>
  <p>Logo yükle, dispenser üzerinde canlı konumlandır, PNG olarak indir. İlk sürüm ücretsiz canvas motoruyla çalışır; API gerektirmez.</p>
  <div class="grid">
    <div class="card">
      <label>Logo yükle</label>
      <input id="logo" type="file" accept="image/*">
      <label>Ürün seç</label>
      <select id="product">
        <option value="black">Matte Black Dispenser</option>
        <option value="white">White Minimal Dispenser</option>
        <option value="amber">Amber Bottle</option>
      </select>
      <label>Logo boyutu</label>
      <input id="scale" type="range" min="40" max="260" value="130">
      <label>Logo X</label>
      <input id="x" type="range" min="40" max="660" value="360">
      <label>Logo Y</label>
      <input id="y" type="range" min="90" max="620" value="360">
      <button onclick="downloadMockup()">PNG indir</button>
      <button class="ghost" onclick="draw()">Yenile</button>
    </div>
    <div class="card">
      <canvas id="c" width="760" height="760"></canvas>
    </div>
  </div>
    
</main>

<script>
let logoImg=null;
const c=document.getElementById('c'), ctx=c.getContext('2d');
function drawBottle(type){
  ctx.clearRect(0,0,c.width,c.height);
  const g=ctx.createRadialGradient(380,180,80,380,380,520);
  g.addColorStop(0,'#2b251d'); g.addColorStop(1,'#050505');
  ctx.fillStyle=g; ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle='rgba(200,169,106,.18)';
  ctx.beginPath(); ctx.arc(380,380,290,0,Math.PI*2); ctx.fill();
  let color = type==='white' ? '#eee9df' : type==='amber' ? '#6b3f20' : '#111';
  let stroke = type==='white' ? '#c8a96a' : '#c8a96a';
  ctx.fillStyle=color; ctx.strokeStyle=stroke; ctx.lineWidth=3;
  roundRect(ctx,260,150,240,470,38,true,true);
  ctx.fillStyle= type==='white' ? '#d7d0c5' : '#050505';
  roundRect(ctx,305,100,150,75,18,true,false);
  ctx.fillStyle='#c8a96a'; roundRect(ctx,325,74,110,28,12,true,false);
  ctx.fillStyle='rgba(255,255,255,.11)'; roundRect(ctx,285,180,34,400,18,true,false);
}
function roundRect(ctx,x,y,w,h,r,fill,stroke){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); if(fill)ctx.fill(); if(stroke)ctx.stroke(); }
function draw(){
  const type=document.getElementById('product').value;
  drawBottle(type);
  ctx.fillStyle='#f7f2e8'; ctx.font='28px Georgia'; ctx.textAlign='center';
  ctx.fillText('GISA BLACK EDITION',380,690);
  if(logoImg){
    const s=+document.getElementById('scale').value, x=+document.getElementById('x').value, y=+document.getElementById('y').value;
    const ratio=logoImg.width/logoImg.height;
    ctx.drawImage(logoImg,x-s*ratio/2,y-s/2,s*ratio,s);
  } else {
    ctx.fillStyle='rgba(247,242,232,.65)'; ctx.font='22px Arial';
    ctx.fillText('LOGO AREA',380,365);
  }
}
document.getElementById('logo').onchange=e=>{
  const file=e.target.files[0]; if(!file) return;
  const img=new Image(); img.onload=()=>{logoImg=img;draw();};
  img.src=URL.createObjectURL(file);
};
['scale','x','y','product'].forEach(id=>document.getElementById(id).oninput=draw);
function downloadMockup(){ const a=document.createElement('a'); a.download='gisa-logo-mockup.png'; a.href=c.toDataURL('image/png'); a.click(); }
draw();
</script>

</body>
</html>
